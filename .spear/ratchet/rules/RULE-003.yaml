description: |
  Turbo-based monorepo roots MUST declare a "packageManager" field in
  package.json. Without it, turbo 2.x refuses to resolve workspaces and
  every test/build/lint task fails silently.
check: |
  jq -e '.packageManager' package.json > /dev/null
