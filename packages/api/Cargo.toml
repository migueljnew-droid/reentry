[package]
name = "reentry-api"
version = "0.1.0"
edition = "2021"
description = "REENTRY — AI-Powered Reentry Navigator API"

[dependencies]
# Web framework
actix-web = "4"
actix-cors = "0.7"
actix-rt = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono", "json"] }

# Auth
jsonwebtoken = "9"

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP client (for LLM APIs, external services)
reqwest = { version = "0.12", features = ["json", "multipart"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Environment
dotenvy = "0.15"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-actix-web = "0.7"

# Error handling
thiserror = "2"
anyhow = "1"
